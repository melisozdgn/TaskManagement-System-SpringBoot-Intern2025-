services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: officepal
      POSTGRES_USER: officepal
      POSTGRES_PASSWORD: officepal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./officepal-api
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/officepal
      SPRING_DATASOURCE_USERNAME: officepal
      SPRING_DATASOURCE_PASSWORD: officepal
    ports:
      - "8080:8080"
    restart: always

  frontend:
    build:
      context: ./officepal-frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"
    restart: always

volumes:
  pgdata: 